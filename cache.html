<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Shika~Store</title>
  <style>
    body {
    background-image: url("PS4.png"); /* العودة إلى الصورة الأصلية png */
    background-position: center;
    background-size: cover;
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-color: #24272b;
    color: white;
    text-align: center;
    overflow: hidden;
    direction: rtl; /* إضافة اتجاه النص من اليمين لليسار */
  }

    h1 {
      margin-top: 30px;
      text-align: center;
    }

    #myProgress {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 600px;
      height: 30px;
      color: white;
      border-radius: 100px;
      border: solid 1px rgb(0, 150, 255);
      box-shadow: 0px 0px 5px rgb(0, 150, 255);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.3); /* شفاف */
    }

    #myBar {
      width: 0%;
      min-width: 100px;
      height: 30px;
      background-color: #080261;
      text-align: center;
      line-height: 30px;
      color: white;
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    footer {
      background-color: #032140;
      color: white;
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
    }
  </style>
    <!-- JavaScript -->
  </style>
  <body>
  <script>
    if (window.applicationCache) {
      if (window.applicationCache.status === 2) {
        localStorage.is755BCached = true;
      }

      window.applicationCache.ondownloading = function () {
        document.getElementById("progress").innerHTML = "Page Caching Started!!";
        localStorage.is755BCached = false;
      };

      window.applicationCache.onprogress = function (a) {
        const percent = Math.round(100 * (a.loaded / a.total));
        document.getElementById("myBar").style.width = percent + "%";
        document.getElementById("myBar").innerHTML = percent + "%";
      };

      window.applicationCache.oncached = function () {
        document.getElementById("progress").innerHTML = "Page Cached Successfully!!";
        localStorage.is755BCached = true;
        setTimeout(() => location.reload(), 1500);
      };

      window.applicationCache.onupdateready = function () {
        document.getElementById("progress").innerHTML = "Update Cache Successfully!!";
        localStorage.is755BCached = true;
        setTimeout(() => location.reload(), 1500);
      };

      window.applicationCache.onnoupdate = function () {
        location.replace("index.html");
      };

      window.applicationCache.onerror = function () {
        location.replace("index.html");
      };
    }
   </script>
   <!-- Status Message -->
  <h1 id="progress" class="titlehead">!! Loading.. Please Wait</h1>
  <hr><br>
  <script>
</head>

<body onload="frame1()">

  <!-- Progress Bar -->
  <div id="myProgress">
  <div id="myBar">0%</div>
  </div>
  <!-- Footer -->
  <footer>
 Shika~Store © All rights reserved
  </footer>
</body>
</html>
