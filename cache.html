<!DOCTYPE html>
<html manifest="cache.manifest" lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Shika~Store</title>
<link rel="stylesheet" href="style.css">
<style>
    body {
        text-align: center;
    }
    h1 {
        margin-top: 30px;
    }
    #msgs {
        font-size: 30px;
        margin-top: 77px;
        margin-bottom: 455px;
    }
</style>
</head>
<body>
<script>
history.replaceState(null,null,
'index.html');var histlength=history.length;history.go(-histlength);
function DLProgress(e){Percent=(Math.round(e.loaded / e.total * 100));setTimeout(function(){window.msgs.innerHTML="Offline Cache" + Percent + "%";},500)}
function DisplayCacheProgress(){setTimeout(function(){window.msgs.innerHTML="Offline Cache Done  ✔";},1500);setTimeout(function(){window.msgs.innerHTML=" Close The Broswer And Internet Then Reopen Broswer Again ";},3500);}window.applicationCache.addEventListener("progress",DLProgress,false);window.applicationCache.oncached=function(e){DisplayCacheProgress();};window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
</script>
</div>
<h1 id="msgs">Starting Offline Cache ...</h1>
</body>
</html>
