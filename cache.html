<!DOCTYPE html>
<html manifest="cache.manifest" lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Shika~Store</title>
<link rel="stylesheet" href="style.css">
<style>
    body {
        text-align: center;
    }
    h1 {
        margin-top: 30px;
    }
    #msgs {
        font-size: 30px;
        margin-top: 77px;
        margin-bottom: 455px;
    }
</style>
</head>
<body>
<script>
function DLProgress(e){
	parent.ScrOverlay.style.display="block";
	Percent=(Math.round(e.loaded / e.total * 100));
	parent.cacheUPDtxt.innerHTML="Installing Offline Cache: " + Percent + "%";
	parent.CacheBar.style.width=Percent + '%';
}
function DisplayCacheProgress(){
	setTimeout(function(){parent.cacheUPDtxt.innerHTML="Cache Installed Successfully.Reopen the Page !!"; }, 1500);localStorage.cached672="yes";};
	window.applicationCache.addEventListener("progress",DLProgress,false);
	window.applicationCache.oncached=function(e){DisplayCacheProgress();};
	window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
	window.applicationCache.onnoupdate=function(){localStorage.cached672="yes";};
    window.applicationCache.onerror=function(){localStorage.cached672="yes";};
</script>
</div>
</body>
</html>
